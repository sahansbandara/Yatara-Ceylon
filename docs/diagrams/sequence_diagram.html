<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yatara Ceylon - Sequence Diagram</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #fff; display: flex; justify-content: center; padding: 15px; }
  .container { width: 1400px; }
  .title { text-align: center; font-size: 20px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
  .subtitle { text-align: center; font-size: 12px; color: #666; margin-bottom: 15px; }
</style>
</head>
<body>
<div class="container">
  <div class="title">Sequence Diagram — Booking → Payment → Confirmation</div>
  <div class="subtitle">Yatara Ceylon — Tourism Operations Management System (TOMS)</div>

  <svg viewBox="0 0 1380 1150" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
    <defs>
      <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
      </marker>
      <marker id="arr-ret" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10" fill="none" stroke="#64748b" stroke-width="1.5"/>
      </marker>
      <marker id="arr-blue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
      </marker>
      <marker id="arr-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
      </marker>
      <marker id="arr-amber" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
      </marker>
    </defs>

    <!-- ========== PARTICIPANTS ========== -->
    <!-- Customer -->
    <rect x="60" y="20" width="120" height="40" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
    <text x="120" y="45" text-anchor="middle" font-size="12" font-weight="600" fill="#0c4a6e">Customer</text>
    <line x1="120" y1="60" x2="120" y2="1080" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6,4"/>
    <rect x="60" y="1080" width="120" height="30" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
    <text x="120" y="1100" text-anchor="middle" font-size="10" fill="#0c4a6e">Customer</text>

    <!-- Browser -->
    <rect x="270" y="20" width="120" height="40" rx="8" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
    <text x="330" y="45" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">Browser</text>
    <line x1="330" y1="60" x2="330" y2="1080" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6,4"/>
    <rect x="270" y="1080" width="120" height="30" rx="6" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
    <text x="330" y="1100" text-anchor="middle" font-size="10" fill="#1e293b">Browser</text>

    <!-- Next.js Middleware -->
    <rect x="470" y="20" width="140" height="40" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
    <text x="540" y="38" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Next.js</text>
    <text x="540" y="52" text-anchor="middle" font-size="9" fill="#92400e">Middleware</text>
    <line x1="540" y1="60" x2="540" y2="1080" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6,4"/>
    <rect x="470" y="1080" width="140" height="30" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
    <text x="540" y="1100" text-anchor="middle" font-size="10" fill="#92400e">Middleware</text>

    <!-- Route Handler / API -->
    <rect x="660" y="20" width="140" height="40" rx="8" fill="#faf5ff" stroke="#9333ea" stroke-width="1.5"/>
    <text x="730" y="38" text-anchor="middle" font-size="11" font-weight="600" fill="#581c87">Route Handler</text>
    <text x="730" y="52" text-anchor="middle" font-size="9" fill="#581c87">(/app/api/*)</text>
    <line x1="730" y1="60" x2="730" y2="1080" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6,4"/>
    <rect x="660" y="1080" width="140" height="30" rx="6" fill="#faf5ff" stroke="#9333ea" stroke-width="1"/>
    <text x="730" y="1100" text-anchor="middle" font-size="10" fill="#581c87">Route Handler</text>

    <!-- Service Layer -->
    <rect x="860" y="20" width="140" height="40" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="930" y="38" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">Service Layer</text>
    <text x="930" y="52" text-anchor="middle" font-size="9" fill="#14532d">(*.service.ts)</text>
    <line x1="930" y1="60" x2="930" y2="1080" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6,4"/>
    <rect x="860" y="1080" width="140" height="30" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
    <text x="930" y="1100" text-anchor="middle" font-size="10" fill="#14532d">Service Layer</text>

    <!-- MongoDB -->
    <rect x="1060" y="20" width="120" height="40" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
    <text x="1120" y="45" text-anchor="middle" font-size="12" font-weight="600" fill="#7f1d1d">MongoDB</text>
    <line x1="1120" y1="60" x2="1120" y2="1080" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6,4"/>
    <rect x="1060" y="1080" width="120" height="30" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
    <text x="1120" y="1100" text-anchor="middle" font-size="10" fill="#7f1d1d">MongoDB</text>

    <!-- PayHere -->
    <rect x="1240" y="20" width="120" height="40" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
    <text x="1300" y="45" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412">PayHere</text>
    <line x1="1300" y1="60" x2="1300" y2="1080" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6,4"/>
    <rect x="1240" y="1080" width="120" height="30" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1"/>
    <text x="1300" y="1100" text-anchor="middle" font-size="10" fill="#9a3412">PayHere</text>

    <!-- ========== PHASE 1: BOOKING REQUEST ========== -->
    <rect x="20" y="85" width="1350" height="225" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1" opacity="0.4"/>
    <text x="35" y="102" font-size="11" font-weight="700" fill="#1e40af">PHASE 1 — Booking Request</text>

    <!-- 1. Customer fills form -->
    <line x1="120" y1="120" x2="318" y2="120" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="220" y="115" text-anchor="middle" font-size="9" fill="#334155">1. Fill booking form</text>

    <!-- 2. Browser sends POST -->
    <line x1="330" y1="150" x2="528" y2="150" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="430" y="145" text-anchor="middle" font-size="9" fill="#334155">2. POST /api/bookings</text>
    <text x="430" y="160" text-anchor="middle" font-size="8" fill="#64748b">(Cookie: JWT token)</text>

    <!-- 3. Middleware verifies JWT -->
    <rect x="515" y="170" width="50" height="25" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
    <text x="540" y="187" text-anchor="middle" font-size="8" font-weight="500" fill="#92400e">verify</text>
    <text x="540" y="207" text-anchor="middle" font-size="8" fill="#64748b">jwt.verify(token)</text>

    <!-- 4. Forward to handler -->
    <line x1="540" y1="200" x2="718" y2="200" stroke="#d97706" stroke-width="1.5" marker-end="url(#arr-amber)"/>
    <text x="630" y="195" text-anchor="middle" font-size="9" fill="#92400e">4. Authenticated request</text>

    <!-- 5. Handler calls service -->
    <line x1="730" y1="230" x2="918" y2="230" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="825" y="225" text-anchor="middle" font-size="9" fill="#334155">5. BookingService.create()</text>

    <!-- 6. Service validates + saves -->
    <line x1="930" y1="260" x2="1108" y2="260" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
    <text x="1020" y="255" text-anchor="middle" font-size="9" fill="#14532d">6. Booking.create({status: NEW})</text>

    <!-- 7. Return booking doc -->
    <line x1="1108" y1="285" x2="942" y2="285" stroke="#64748b" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
    <text x="1025" y="280" text-anchor="middle" font-size="8" fill="#64748b">7. bookingDoc</text>

    <!-- 8. Return response chain -->
    <line x1="918" y1="300" x2="742" y2="300" stroke="#64748b" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
    <text x="830" y="295" text-anchor="middle" font-size="8" fill="#64748b">8. serialised JSON</text>

    <!-- ========== PHASE 2: STAFF PROCESSING ========== -->
    <rect x="20" y="320" width="1350" height="200" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1" opacity="0.4"/>
    <text x="35" y="337" font-size="11" font-weight="700" fill="#166534">PHASE 2 — Staff Processing & Invoice</text>

    <!-- Staff contacts customer -->
    <rect x="705" y="350" width="50" height="25" rx="3" fill="#faf5ff" stroke="#9333ea" stroke-width="1"/>
    <text x="730" y="367" text-anchor="middle" font-size="8" font-weight="500" fill="#581c87">staff</text>

    <!-- Status updates -->
    <line x1="730" y1="380" x2="918" y2="380" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="825" y="375" text-anchor="middle" font-size="9" fill="#334155">9. updateStatus(CONTACTED)</text>

    <line x1="930" y1="400" x2="1108" y2="400" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
    <text x="1020" y="395" text-anchor="middle" font-size="9" fill="#14532d">10. booking.status = CONTACTED</text>

    <!-- Confirm + generate invoice -->
    <line x1="730" y1="430" x2="918" y2="430" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="825" y="425" text-anchor="middle" font-size="9" fill="#334155">11. confirmBooking()</text>

    <line x1="930" y1="450" x2="1108" y2="450" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
    <text x="1020" y="445" text-anchor="middle" font-size="9" fill="#14532d">12. Invoice.create(deposit=20%)</text>

    <line x1="930" y1="470" x2="1108" y2="470" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
    <text x="1020" y="465" text-anchor="middle" font-size="9" fill="#14532d">13. status → PAYMENT_PENDING</text>

    <!-- Notify customer -->
    <line x1="918" y1="490" x2="742" y2="490" stroke="#64748b" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
    <text x="830" y="500" text-anchor="middle" font-size="8" fill="#64748b">14. Send email notification</text>

    <!-- ========== PHASE 3: PAYMENT ========== -->
    <rect x="20" y="530" width="1350" height="260" rx="6" fill="#fefce8" stroke="#fde68a" stroke-width="1" opacity="0.4"/>
    <text x="35" y="547" font-size="11" font-weight="700" fill="#854d0e">PHASE 3 — 20% Advance Payment (PayHere)</text>

    <!-- Customer clicks pay -->
    <line x1="120" y1="570" x2="318" y2="570" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="220" y="565" text-anchor="middle" font-size="9" fill="#334155">15. Click "Pay 20% Advance"</text>

    <!-- Redirect to PayHere -->
    <line x1="330" y1="600" x2="1288" y2="600" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="810" y="595" text-anchor="middle" font-size="9" fill="#9a3412">16. Redirect to PayHere checkout (merchant_id, order_id, amount, hash)</text>

    <!-- Customer pays -->
    <line x1="120" y1="630" x2="1288" y2="630" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="710" y="625" text-anchor="middle" font-size="9" fill="#334155">17. Customer enters card details & pays</text>

    <!-- PayHere redirect back -->
    <line x1="1288" y1="660" x2="342" y2="660" stroke="#64748b" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
    <text x="810" y="655" text-anchor="middle" font-size="9" fill="#64748b">18. Redirect to return_url (success page)</text>

    <!-- Server-to-server callback -->
    <rect x="680" y="678" width="200" height="20" rx="3" fill="#fff7ed" stroke="#ea580c" stroke-width="1"/>
    <text x="780" y="692" text-anchor="middle" font-size="9" font-weight="600" fill="#9a3412">Server-to-Server Callback (IPN)</text>

    <line x1="1288" y1="710" x2="742" y2="710" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="1015" y="705" text-anchor="middle" font-size="9" fill="#9a3412">19. POST /api/payhere/notify</text>
    <text x="1015" y="718" text-anchor="middle" font-size="8" fill="#64748b">(order_id, amount, md5sig, status_code)</text>

    <!-- Verify hash -->
    <rect x="705" y="730" width="50" height="25" rx="3" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
    <text x="730" y="747" text-anchor="middle" font-size="7" font-weight="600" fill="#7f1d1d">MD5</text>
    <text x="730" y="768" text-anchor="middle" font-size="7" fill="#64748b">verify sig</text>

    <!-- Save payment -->
    <line x1="730" y1="778" x2="918" y2="778" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="825" y="773" text-anchor="middle" font-size="9" fill="#334155">20. PaymentService.recordAdvance()</text>

    <!-- ========== PHASE 4: CONFIRMATION ========== -->
    <rect x="20" y="800" width="1350" height="270" rx="6" fill="#fdf2f8" stroke="#fbcfe8" stroke-width="1" opacity="0.4"/>
    <text x="35" y="817" font-size="11" font-weight="700" fill="#9d174d">PHASE 4 — Confirmation & Ledger Update</text>

    <!-- Create payment record -->
    <line x1="930" y1="840" x2="1108" y2="840" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
    <text x="1020" y="835" text-anchor="middle" font-size="9" fill="#14532d">21. Payment.create(type: ADVANCE)</text>

    <line x1="1108" y1="860" x2="942" y2="860" stroke="#64748b" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
    <text x="1025" y="855" text-anchor="middle" font-size="8" fill="#64748b">paymentDoc</text>

    <!-- Update booking status -->
    <line x1="930" y1="885" x2="1108" y2="885" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
    <text x="1020" y="880" text-anchor="middle" font-size="9" fill="#14532d">22. booking.status → BALANCE_PENDING</text>

    <!-- Return success to PayHere -->
    <line x1="730" y1="910" x2="1288" y2="910" stroke="#64748b" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
    <text x="1010" y="905" text-anchor="middle" font-size="9" fill="#64748b">23. HTTP 200 OK</text>

    <!-- Later: staff collects balance -->
    <rect x="680" y="935" width="200" height="20" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
    <text x="780" y="949" text-anchor="middle" font-size="9" font-weight="600" fill="#14532d">Later — Balance Collection</text>

    <line x1="730" y1="965" x2="918" y2="965" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="825" y="960" text-anchor="middle" font-size="9" fill="#334155">24. recordBalance(manual)</text>

    <line x1="930" y1="985" x2="1108" y2="985" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
    <text x="1020" y="980" text-anchor="middle" font-size="9" fill="#14532d">25. Payment.create(type: BALANCE)</text>

    <line x1="930" y1="1005" x2="1108" y2="1005" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
    <text x="1020" y="1000" text-anchor="middle" font-size="9" fill="#14532d">26. booking.status → FULLY_PAID</text>

    <!-- Final confirmation to customer -->
    <line x1="918" y1="1030" x2="342" y2="1030" stroke="#64748b" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
    <text x="630" y="1025" text-anchor="middle" font-size="9" fill="#64748b">27. Email: Booking confirmed & fully paid</text>

    <line x1="318" y1="1050" x2="132" y2="1050" stroke="#64748b" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
    <text x="225" y="1045" text-anchor="middle" font-size="9" fill="#64748b">28. Display confirmation</text>

    <!-- Footer -->
    <text x="690" y="1140" text-anchor="middle" font-size="10" fill="#94a3b8">SLIIT ITP · IT24100559 · Yatara Ceylon TOMS · Sequence Diagram</text>
  </svg>
</div>
</body>
</html>
