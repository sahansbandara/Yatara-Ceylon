<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yatara Ceylon - Booking Flow Diagram</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #fff; display: flex; justify-content: center; padding: 15px; }
  .container { width: 1400px; }
  .title { text-align: center; font-size: 20px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
  .subtitle { text-align: center; font-size: 12px; color: #666; margin-bottom: 15px; }
</style>
</head>
<body>
<div class="container">
  <div class="title">Booking Lifecycle — State Machine Flow</div>
  <div class="subtitle">Yatara Ceylon — Tourism Operations Management System (TOMS)</div>

  <svg viewBox="0 0 1380 900" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
    <defs>
      <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
      </marker>
      <marker id="arr-red" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
      </marker>
      <marker id="arr-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
      </marker>
      <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
      </filter>
    </defs>

    <!-- ========== START ========== -->
    <circle cx="120" cy="80" r="18" fill="#1e293b" stroke="#0f172a" stroke-width="2"/>
    <text x="120" y="85" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">START</text>
    <line x1="138" y1="80" x2="210" y2="80" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>

    <!-- ========== STATE: NEW ========== -->
    <rect x="220" y="55" width="160" height="50" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="2" filter="url(#shadow)"/>
    <text x="300" y="77" text-anchor="middle" font-size="13" font-weight="700" fill="#0c4a6e">NEW</text>
    <text x="300" y="93" text-anchor="middle" font-size="9" fill="#64748b">Customer submits request</text>

    <!-- NEW → CONTACTED -->
    <line x1="380" y1="80" x2="480" y2="80" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
    <text x="430" y="72" text-anchor="middle" font-size="8" fill="#64748b">Staff reaches out</text>

    <!-- ========== STATE: CONTACTED ========== -->
    <rect x="490" y="55" width="160" height="50" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
    <text x="570" y="77" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">CONTACTED</text>
    <text x="570" y="93" text-anchor="middle" font-size="9" fill="#64748b">Staff talking to customer</text>

    <!-- CONTACTED → CONFIRMED -->
    <line x1="650" y1="80" x2="750" y2="80" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
    <text x="700" y="72" text-anchor="middle" font-size="8" fill="#64748b">Terms agreed</text>

    <!-- ========== STATE: CONFIRMED ========== -->
    <rect x="760" y="55" width="160" height="50" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
    <text x="840" y="77" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">CONFIRMED</text>
    <text x="840" y="93" text-anchor="middle" font-size="9" fill="#64748b">Booking terms locked in</text>

    <!-- CONFIRMED → PAYMENT_PENDING -->
    <line x1="840" y1="105" x2="840" y2="195" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
    <text x="860" y="155" font-size="8" fill="#64748b">Invoice generated</text>

    <!-- ========== STATE: PAYMENT_PENDING ========== -->
    <rect x="740" y="200" width="200" height="50" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2" filter="url(#shadow)"/>
    <text x="840" y="222" text-anchor="middle" font-size="13" font-weight="700" fill="#854d0e">PAYMENT_PENDING</text>
    <text x="840" y="238" text-anchor="middle" font-size="9" fill="#64748b">Awaiting 20% advance</text>

    <!-- PAYMENT_PENDING → BALANCE_PENDING -->
    <line x1="840" y1="250" x2="840" y2="340" stroke="#16a34a" stroke-width="2" marker-end="url(#arr-green)"/>
    <text x="860" y="300" font-size="8" fill="#16a34a">PayHere: 20% paid ✓</text>

    <!-- ========== STATE: BALANCE_PENDING ========== -->
    <rect x="740" y="345" width="200" height="50" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
    <text x="840" y="367" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">BALANCE_PENDING</text>
    <text x="840" y="383" text-anchor="middle" font-size="9" fill="#64748b">80% balance due</text>

    <!-- BALANCE_PENDING → FULLY_PAID -->
    <line x1="840" y1="395" x2="840" y2="485" stroke="#16a34a" stroke-width="2" marker-end="url(#arr-green)"/>
    <text x="860" y="445" font-size="8" fill="#16a34a">Staff records balance ✓</text>

    <!-- ========== STATE: FULLY_PAID ========== -->
    <rect x="740" y="490" width="200" height="50" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
    <text x="840" y="512" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">FULLY_PAID</text>
    <text x="840" y="528" text-anchor="middle" font-size="9" fill="#64748b">All payments collected</text>

    <!-- FULLY_PAID → IN_PROGRESS -->
    <line x1="840" y1="540" x2="840" y2="630" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
    <text x="860" y="590" font-size="8" fill="#64748b">Trip date arrives</text>

    <!-- ========== STATE: IN_PROGRESS ========== -->
    <rect x="740" y="635" width="200" height="50" rx="10" fill="#c7d2fe" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
    <text x="840" y="657" text-anchor="middle" font-size="13" font-weight="700" fill="#3730a3">IN_PROGRESS</text>
    <text x="840" y="673" text-anchor="middle" font-size="9" fill="#64748b">Trip is happening</text>

    <!-- IN_PROGRESS → COMPLETED -->
    <line x1="840" y1="685" x2="840" y2="775" stroke="#16a34a" stroke-width="2" marker-end="url(#arr-green)"/>
    <text x="860" y="735" font-size="8" fill="#16a34a">Trip finished ✓</text>

    <!-- ========== STATE: COMPLETED ========== -->
    <rect x="740" y="780" width="200" height="50" rx="10" fill="#bbf7d0" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
    <text x="840" y="802" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">COMPLETED</text>
    <text x="840" y="818" text-anchor="middle" font-size="9" fill="#64748b">Successfully finished</text>

    <!-- END for completed -->
    <circle cx="840" cy="860" r="14" fill="none" stroke="#1e293b" stroke-width="2"/>
    <circle cx="840" cy="860" r="9" fill="#1e293b"/>
    <line x1="840" y1="830" x2="840" y2="846" stroke="#1e293b" stroke-width="2"/>

    <!-- ========== CANCELLATION PATHS (Left side) ========== -->
    <!-- NEW → CANCELLED -->
    <line x1="300" y1="105" x2="300" y2="370" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-red)"/>
    <text x="240" y="240" font-size="8" fill="#dc2626">Customer cancels</text>
    <text x="240" y="252" font-size="7" fill="#dc2626">(>5 days before)</text>

    <!-- CONTACTED → CANCELLED -->
    <line x1="570" y1="105" x2="420" y2="370" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-red)"/>
    <text x="465" y="240" font-size="8" fill="#dc2626">No response</text>

    <!-- CONFIRMED → CANCELLED -->
    <line x1="760" y1="95" x2="470" y2="370" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arr-red)"/>
    <text x="595" y="250" font-size="8" fill="#dc2626">Cancel before payment</text>

    <!-- ========== STATE: CANCELLED ========== -->
    <rect x="220" y="375" width="200" height="50" rx="10" fill="#fecaca" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
    <text x="320" y="397" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">CANCELLED</text>
    <text x="320" y="413" text-anchor="middle" font-size="9" fill="#64748b">Booking terminated</text>

    <!-- END for cancelled -->
    <circle cx="320" cy="460" r="14" fill="none" stroke="#dc2626" stroke-width="2"/>
    <circle cx="320" cy="460" r="9" fill="#dc2626"/>
    <line x1="320" y1="425" x2="320" y2="446" stroke="#dc2626" stroke-width="2"/>

    <!-- ========== REFUND PATHS ========== -->
    <!-- BALANCE_PENDING → REFUNDED -->
    <line x1="740" y1="385" x2="470" y2="570" stroke="#f97316" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="580" y="475" font-size="8" fill="#f97316">Refund approved</text>

    <!-- FULLY_PAID → REFUNDED -->
    <line x1="740" y1="525" x2="470" y2="585" stroke="#f97316" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="580" y="545" font-size="8" fill="#f97316">Post-payment refund</text>

    <!-- ========== STATE: REFUNDED ========== -->
    <rect x="220" y="555" width="200" height="50" rx="10" fill="#fed7aa" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
    <text x="320" y="577" text-anchor="middle" font-size="13" font-weight="700" fill="#9a3412">REFUNDED</text>
    <text x="320" y="593" text-anchor="middle" font-size="9" fill="#64748b">Payment returned</text>

    <!-- END for refunded -->
    <circle cx="320" cy="640" r="14" fill="none" stroke="#f97316" stroke-width="2"/>
    <circle cx="320" cy="640" r="9" fill="#f97316"/>
    <line x1="320" y1="605" x2="320" y2="626" stroke="#f97316" stroke-width="2"/>

    <!-- ========== LEGEND ========== -->
    <rect x="30" y="830" width="640" height="55" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="55" y="852" font-size="11" font-weight="600" fill="#1e293b">Legend:</text>

    <line x1="120" y1="848" x2="160" y2="848" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
    <text x="170" y="852" font-size="9" fill="#475569">Normal transition</text>

    <line x1="260" y1="848" x2="300" y2="848" stroke="#16a34a" stroke-width="2" marker-end="url(#arr-green)"/>
    <text x="310" y="852" font-size="9" fill="#475569">Success transition</text>

    <line x1="420" y1="848" x2="460" y2="848" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="470" y="852" font-size="9" fill="#475569">Cancellation path</text>

    <line x1="575" y1="848" x2="615" y2="848" stroke="#f97316" stroke-width="1.5" stroke-dasharray="6,3"/>
    <text x="625" y="852" font-size="9" fill="#475569">Refund path</text>

    <text x="55" y="875" font-size="8" fill="#94a3b8">10 states · Finite State Machine · Each transition validated by service layer · Invalid jumps rejected</text>

    <!-- Footer -->
    <text x="1100" y="865" text-anchor="middle" font-size="10" fill="#94a3b8">SLIIT ITP · IT24100559</text>
  </svg>
</div>
</body>
</html>
